<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Shot Lists</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #0f0f0f; color: #f0ece4; min-height: 100vh; }
  header { padding: 48px 32px 32px; text-align: center; border-bottom: 1px solid #222; }
  header h1 { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: #c9a96e; font-weight: normal; margin-bottom: 10px; }
  header p { font-size: 28px; color: #f0ece4; font-weight: normal; letter-spacing: 0.5px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2px; max-width: 1400px; margin: 32px auto; padding: 0 32px; }
  .card { background: #1a1a1a; border-radius: 6px; overflow: hidden; text-decoration: none; color: inherit; display: block; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
  .card-thumb { width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block; }
  .card-body { padding: 16px; }
  .card-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #c9a96e; margin-bottom: 6px; }
  .card-title { font-size: 16px; color: #f0ece4; margin-bottom: 4px; line-height: 1.4; }
  .card-meta { font-size: 12px; color: #666; margin-top: 8px; display: flex; gap: 12px; }
  .card-tag { background: #222; color: #888; padding: 3px 8px; border-radius: 3px; font-size: 11px; }
  .empty-card { background: #111; border: 2px dashed #2a2a2a; border-radius: 6px; aspect-ratio: 9/16; display: flex; align-items: center; justify-content: center; color: #333; font-size: 13px; letter-spacing: 1px; }
  footer { text-align: center; padding: 40px 32px; color: #333; font-size: 11px; letter-spacing: 1px; border-top: 1px solid #1a1a1a; }
</style>
</head>
<body>
<header>
  <h1>Reference Library</h1>
  <p>Reel Shot Lists</p>
</header>
<div class="grid">
  <a class="card" href="josette-dubai.html">
    <img class="card-thumb" src="frames/josette-dubai/frame_0003.jpg" alt="Josette Dubai thumbnail">
    <div class="card-body">
      <div class="card-label">@josettedubai</div>
      <div class="card-title">Morning Moments at Josette</div>
      <div class="card-meta">
        <span class="card-tag">20 shots</span>
        <span class="card-tag">17.78s</span>
        <span class="card-tag">Mediterranean Boho</span>
      </div>
    </div>
  </a>
  <div class="empty-card">+ Next reel</div>
  <div class="empty-card">+ Next reel</div>
</div>
<footer>Shot lists generated by frame-accurate video analysis</footer>
</body>
</html>
